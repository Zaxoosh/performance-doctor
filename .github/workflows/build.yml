name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Fabric 1.21.1
        run: ./gradlew build

      - name: Build NeoForge 1.21.1
        run: ./gradlew -p platforms/neoforge-1.21.1 build

      - name: Build Forge 1.21.1
        working-directory: platforms/forge-1.21.1
        run: ./gradlew build
